<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Esta línea es clave para que se adapte a pantallas de celulares -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio Web</title>
    <style>
        /* Estilos generales */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor principal responsivo */
        .card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 85%; /* Se encoge en pantallas pequeñas */
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        p {
            color: #7f8c8d;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        /* Botón interactivo */
        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 10px 24px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Hola, soy el Ing. Cortazar!</h1>
        <p>Bienvenido a mi sitio web. Es un ejemplo de página web publicada en vivo usando GitHub Pages.</p>
        <a href="https://github.com" target="_blank" class="btn">Ver mi GitHub</a>
    </div>

</body>
</html>
